name: Keep Render Alive

on:
  schedule:
    # 05:00 - 06:59 Mon-Fri (Local Time UTC+7)
    # This is 22:00 - 23:59 Sun-Thu (UTC)
    - cron: '*/10 22-23 * * 0-4'
    
    # 07:00 - 17:30 Mon-Fri (Local Time UTC+7)
    # This is 00:00 - 10:30 Mon-Fri (UTC)
    - cron: '*/10 0-10 * * 1-5'

  workflow_dispatch: # Allow manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -s -I https://rota-47dp.onrender.com/api/health | grep "HTTP/"
          echo "Ping sent at $(date)"
